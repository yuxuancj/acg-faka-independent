version: '3.8'

services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: acg-faka-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: acg_faka_2024
      MYSQL_DATABASE: acg_faka
      MYSQL_USER: acgfaka
      MYSQL_PASSWORD: acgfaka123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    networks:
      - acg-network
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_general_ci

  # PHP应用服务
  php:
    image: php:8.1-fpm
    container_name: acg-faka-php
    restart: always
    ports:
      - "9000:9000"
    volumes:
      - .:/var/www/html
    networks:
      - acg-network
    depends_on:
      - mysql
    command: >
      bash -c "docker-php-ext-install pdo pdo_mysql mysqli gd zip opcache &&
               apt-get update && apt-get install -y libzip-dev libpng-dev libjpeg-dev libfreetype6-dev && 
               docker-php-ext-configure gd --with-freetype --with-jpeg &&
               docker-php-ext-install gd &&
               docker-php-ext-enable pdo pdo_mysql mysqli &&
               php-fpm"

  # Nginx Web服务器
  nginx:
    image: nginx:alpine
    container_name: acg-faka-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
      - ./docker/nginx/logs:/var/log/nginx
    networks:
      - acg-network
    depends_on:
      - php
      - mysql

  # Redis缓存（可选）
  redis:
    image: redis:7-alpine
    container_name: acg-faka-redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - acg-network

volumes:
  mysql_data:

networks:
  acg-network:
    driver: bridge
