# ============================================================
# ACG-Faka 独立版 v2.0 - 宝塔Nginx配置模板
# ============================================================

server {
    listen 80;
    listen 443 ssl http2;
    server_name {{DOMAIN}};
    root {{DOCUMENT_ROOT}}/public;
    index index.php index.html index.htm;
    
    # SSL证书配置 (宝塔会自动配置)
    # ssl_certificate {{SSL_CERT}};
    # ssl_certificate_key {{SSL_KEY}};
    
    # 日志
    access_log /www/wwwlogs/{{DOMAIN}}.log;
    error_log /www/wwwlogs/{{DOMAIN}}.error.log;
    
    # 伪静态规则
    location / {
        if (!-e $request_filename){
            rewrite ^(.*)$ /index.php?s=$1 last;
        }
    }
    
    # PHP处理
    location ~ \.php$ {
        fastcgi_pass unix:/tmp/php-cgi-{{PHP_VERSION}}.sock;
        fastcgi_index index.php;
        include fastcgi.conf;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        
        # 超时设置
        fastcgi_connect_timeout 300;
        fastcgi_send_timeout 300;
        fastcgi_read_timeout 300;
    }
    
    # 安全设置 - 禁止访问敏感文件
    location ~* (runtime|application|kernel)/.*\.php$ {
        deny all;
    }
    
    location ~ /\. {
        deny all;
    }
    
    location ~ ^/(\.user\.ini|\.ht|\.git|\.svn|\.hg|\.project|LICENSE|README\.md|DEVELOPMENT.*\.md) {
        deny all;
    }
    
    # 静态资源缓存
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|pdf|txt|woff|woff2|ttf|eot|svg)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # Gzip压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/xml;
}
